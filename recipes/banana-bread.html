    <img src="../images/bread.jpg" alt="A picture of some freshly sliced banana bread on baking paper" height="562" width="750">

    <h2>Ingredients</h2>
    <ul>
        <li><strong>All-purpose Flour:</strong> 2 cups</li>
        <li><strong>Baking Soda:</strong> 1 teaspoon</li>
        <li><strong>Salt:</strong> 1/4 of a teaspoon</li>
        <li><strong>Brown Sugar:</strong> 3/4 of a cup</li>
        <li><strong>Butter:</strong> Half a cup</li>
        <li><strong>Eggs:</strong> 2, beaten</li>
        <li><strong>Bananas:</strong> 2 to 3 cups of mashed, overripe bananas</li>
    </ul>
